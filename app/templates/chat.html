{% extends "base.html" %}
{% block title %}角色交互{% endblock %}

{% block head %}
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
{% endblock %}

{% block content %}
<div class="page-header">
  <h1>🎭 角色扮演对话</h1>
  <p>与当前加载的模型进行实时角色扮演交互</p>
  <div class="section-divider"></div>
</div>

<div class="layout-sidebar">
  <!-- 左侧控制面板 -->
  <div class="sidebar">
    <div class="card">
      <div class="form-group">
        <label class="form-label">选择角色</label>
        <select id="roleSelect" class="form-select">
          <option value="韦小宝">韦小宝</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Max Tokens: <span id="maxTokensVal">256</span></label>
        <input type="range" id="maxTokens" min="64" max="512" value="256" step="32">
      </div>

      <div class="form-group">
        <label class="form-label">Temperature: <span id="temperatureVal">0.7</span></label>
        <input type="range" id="temperature" min="0.1" max="1.5" value="0.7" step="0.1">
      </div>

      <button class="btn btn-secondary" style="width: 100%; margin-top: 12px;" onclick="clearChat()">🗑️ 清空对话</button>
    </div>
  </div>

  <!-- 右侧聊天面板 -->
  <div class="main-panel">
    <div class="chat-container">
      <div class="chat-messages" id="chatMessages">
        <div style="text-align: center; color: var(--text-muted); margin-top: 60px; font-size: 0.9rem;">
          请先在「模型加载」页面加载模型，然后在此输入消息开始对话。
        </div>
      </div>
      <div class="chat-input-area">
        <input type="text" id="chatInput" class="form-input" placeholder="输入你想说的话..." onkeypress="if(event.key === 'Enter') sendMessage()">
        <button class="btn btn-primary" onclick="sendMessage()" id="sendBtn">发送</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  /* ---------- marked config ---------- */
  marked.setOptions({ breaks: true, gfm: true });

  /* ---------- Slider sync ---------- */
  document.getElementById('maxTokens').oninput = e => document.getElementById('maxTokensVal').innerText = e.target.value;
  document.getElementById('temperature').oninput = e => document.getElementById('temperatureVal').innerText = e.target.value;

  /* ---------- Load roles ---------- */
  API.getRoles().then(roles => {
    const sel = document.getElementById('roleSelect');
    sel.innerHTML = '';
    roles.forEach(r => {
      const opt = document.createElement('option');
      opt.value = r;
      opt.innerText = r;
      sel.appendChild(opt);
    });
  }).catch(() => {});

  /* ---------- Chat state ---------- */
  const chatBox = document.getElementById('chatMessages');
  const STORAGE_KEY = 'finetune_chat_history';
  let history = [];  // [{type:'user'|'bot', text:'', meta:''}]

  /* ---------- localStorage ---------- */
  function saveHistory() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(history)); } catch(e) {}
  }

  function loadHistory() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) { history = JSON.parse(raw); }
    } catch(e) { history = []; }
  }

  /* ---------- Render helpers ---------- */
  function renderMarkdown(text) {
    return marked.parse(text);
  }

  function rebuildChat() {
    chatBox.innerHTML = '';
    if (history.length === 0) {
      chatBox.innerHTML = '<div style="text-align:center;color:var(--text-muted);margin-top:60px;font-size:0.9rem;">请先在「模型加载」页面加载模型，然后在此输入消息开始对话。</div>';
      return;
    }
    history.forEach(item => {
      const bubble = document.createElement('div');
      bubble.className = `chat-bubble ${item.type}`;
      if (item.type === 'bot') {
        bubble.innerHTML = renderMarkdown(item.text);
      } else {
        bubble.innerText = item.text;
      }
      chatBox.appendChild(bubble);
      if (item.meta) {
        const m = document.createElement('div');
        m.className = 'chat-meta';
        m.innerText = item.meta;
        chatBox.appendChild(m);
      }
    });
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function appendBubble(type, text, meta) {
    history.push({ type, text, meta: meta || '' });
    saveHistory();
    const bubble = document.createElement('div');
    bubble.className = `chat-bubble ${type}`;
    if (type === 'bot') {
      bubble.innerHTML = renderMarkdown(text);
    } else {
      bubble.innerText = text;
    }
    chatBox.appendChild(bubble);
    if (meta) {
      const m = document.createElement('div');
      m.className = 'chat-meta';
      m.innerText = meta;
      chatBox.appendChild(m);
    }
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  /* ---------- Init: restore from localStorage ---------- */
  loadHistory();
  rebuildChat();

  /* ---------- Send message (streaming) ---------- */
  async function sendMessage() {
    const inputEl = document.getElementById('chatInput');
    const msg = inputEl.value.trim();
    if (!msg) return;

    const sendBtn = document.getElementById('sendBtn');
    inputEl.value = '';
    sendBtn.disabled = true;
    sendBtn.innerText = '...';

    // Clear placeholder if first message
    if (history.length === 0) { chatBox.innerHTML = ''; }

    // User bubble
    history.push({ type: 'user', text: msg, meta: '' });
    saveHistory();
    const userBubble = document.createElement('div');
    userBubble.className = 'chat-bubble user';
    userBubble.innerText = msg;
    chatBox.appendChild(userBubble);

    const role = document.getElementById('roleSelect').value;
    const max_new_tokens = parseInt(document.getElementById('maxTokens').value);
    const temperature = parseFloat(document.getElementById('temperature').value);

    // Build messages array for multi-turn
    const apiMessages = history
      .filter(h => h.type === 'user' || h.type === 'bot')
      .map(h => ({ role: h.type === 'user' ? 'user' : 'assistant', content: h.text }));

    try {
      const response = await fetch('/chat/stream/multi', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          messages: apiMessages,
          char_role: role,
          max_new_tokens,
          temperature,
          max_context_tokens: 1500
        })
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        appendBubble('bot', `⚠️ ${err.detail || response.statusText}`);
        return;
      }

      // Create bot bubble with typing cursor
      const botBubble = document.createElement('div');
      botBubble.className = 'chat-bubble bot typing';
      botBubble.innerHTML = '';
      chatBox.appendChild(botBubble);

      const decoder = new TextDecoder('utf-8');
      const reader = response.body.getReader();
      let sseBuffer = '';
      let fullText = '';
      let finalMeta = '';

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        sseBuffer += decoder.decode(value, { stream: true });
        const events = sseBuffer.split('\n\n');
        sseBuffer = events.pop();

        for (const event of events) {
          const line = event.split('\n').find(item => item.startsWith('data: '));
          if (!line) continue;
          const data = JSON.parse(line.slice(6));
          if (data.token) {
            fullText += data.token;
            botBubble.innerHTML = renderMarkdown(fullText);
            chatBox.scrollTop = chatBox.scrollHeight;
          }
          if (data.done) {
            if (data.blocked) {
              finalMeta = `🛡️ 安全拦截 · ${data.block_reason || ''}`;
            } else {
              finalMeta = `耗时 ${data.latency_s.toFixed(2)}s · ${data.model_type}` + (data.context_tokens ? ` · 上下文 ${data.context_tokens} tokens` : '');
            }
          }
        }
      }

      // Remove typing cursor
      botBubble.classList.remove('typing');
      botBubble.innerHTML = renderMarkdown(fullText);

      // Save bot message to history
      history.push({ type: 'bot', text: fullText, meta: finalMeta });
      saveHistory();

      if (finalMeta) {
        const meta = document.createElement('div');
        meta.className = 'chat-meta';
        meta.innerText = finalMeta;
        chatBox.appendChild(meta);
      }
    } catch (e) {
      appendBubble('bot', `⚠️ 请求失败: ${e.message}`);
    } finally {
      sendBtn.disabled = false;
      sendBtn.innerText = '发送';
      inputEl.focus();
    }
  }

  /* ---------- Clear chat ---------- */
  function clearChat() {
    history = [];
    saveHistory();
    rebuildChat();
  }
</script>
{% endblock %}
