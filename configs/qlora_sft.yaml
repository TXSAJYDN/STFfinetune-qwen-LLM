# QLoRA SFT (指令微调) 配置文件
# 适用于显存 >= 8GB (如 RTX 4060 8GB)

# === 模型配置 ===
model_name_or_path: "./models/Qwen2.5-3B-Instruct"
trust_remote_code: true

# === LoRA 配置 ===
lora:
  r: 32
  lora_alpha: 64
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  task_type: "CAUSAL_LM"
  bias: "none"

# === 量化配置 (QLoRA 启用 4-bit 量化) ===
quantization:
  enabled: true
  load_in_4bit: true
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_use_double_quant: true
  bnb_4bit_quant_type: "nf4"

# === 数据配置 ===
data:
  train_file: "data/sft_train_slim.json"
  val_file: "data/sft_val_slim.json"
  max_seq_length: 512
  prompt_template: "qwen"

# === 训练配置 ===
training:
  output_dir: "outputs/qlora_sft"
  num_train_epochs: 2  # 在已有 1 epoch 基础上再训 2 轮，总共 3 轮
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 1.0e-4  # 继续训练用更小的学习率
  weight_decay: 0.01
  warmup_ratio: 0.03
  lr_scheduler_type: "cosine"
  logging_steps: 10
  save_steps: 500
  eval_steps: 500
  eval_strategy: "steps"
  save_total_limit: 3
  fp16: false
  bf16: true
  gradient_checkpointing: true
  dataloader_num_workers: 4
  report_to: "none"
  seed: 42
